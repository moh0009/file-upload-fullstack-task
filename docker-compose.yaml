services:
  db:
    image: postgres:alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: toor
      POSTGRES_DB: pace_db
    volumes:
      - local_pgdata:/var/lib/postgresql/data
    networks:
      - pace_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d pace_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pace_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://root:toor@db:5432/pace_db?pool_max_conns=40&pool_min_conns=10"
      REDIS_ADDR: "redis:6379"
      SERVER_PORT: "8080"
      UPLOADS_DIR: "/tmp/uploads"
      ENVIRONMENT: "docker"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pace_network

  frontend:
    build:
      context: ./frontend/pace-front_end
      dockerfile: Dockerfile
      # if you want to change the API URL for development, you can uncomment the args section below and set the appropriate URLs.
      # args:
      #   # Pass the public API URL so the built Next.js bundle knows where to point.
      #   # This determines where the browser sends its requests.
      #   NEXT_PUBLIC_API_URL: "http://localhost:8080/api" # Change This if you are using server
      #   NEXT_PUBLIC_WS_URL: "ws://localhost:8080/api" # Change This if you are using server
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pace_network

volumes:
  local_pgdata:
  pgadmin-data:
  redis-data:


networks:
  pace_network:
